name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build idiom
        run: cargo build

      - name: Test idiom
        run: cargo test
