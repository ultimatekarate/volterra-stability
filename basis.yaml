governance:
  version: "1.0"
  model: linguistic
  check_tests: false

# ── volterra-stability is governed by Basis ─────────────────────────
#
# Functional core:
#   dictionary     — Inert nouns. Config types, report structs, channel definitions.
#   laboratory     — Pure logic. Jacobian construction, eigenvalue analysis,
#                    spectral gap, Dyson series, integrators.
#
# No imperative shell — this crate is entirely pure. No IO, no tokio,
# no filesystem, no network. The caller owns the time source.

# ── External Layers ──────────────────────────────────────────────────

layers:
  serialization:
    external: true
    role: "Serialization and deserialization"
    packages: [serde, thiserror]

  linear-algebra:
    external: true
    role: "Matrix and vector computation"
    packages: [nalgebra]

  rust-internal:
    external: true
    role: "Rust language-internal imports"
    packages: [crate, super, self, std, core, alloc]

# ── Internal Layers ──────────────────────────────────────────────────

  dictionary:
    role: "Inert nouns. Configuration types, report structs, channel definitions, coupling model trait."
    packages:
      - "src/config"
      - "src/report"
    rules:
      purity: strict
      io: forbidden
      network: forbidden
      async: forbidden
    depends_on: [serialization, linear-algebra, rust-internal]

  laboratory:
    role: "Pure logic. Integral computation, Jacobian construction, eigenvalue analysis, spectral gap, Dyson series, ODE integrators, matrix exponential."
    packages:
      - "src/integral"
      - "src/scaler"
      - "src/coupling"
      - "src/jacobian"
      - "src/eigenvalues"
      - "src/spectral"
      - "src/pade"
      - "src/dyson"
      - "src/integrators"
      - "src/nonlinear"
      - "src/contractivity"
    rules:
      purity: strict
      io: forbidden
      network: forbidden
      async: forbidden
    depends_on: [dictionary, serialization, linear-algebra, rust-internal]

# ── Purity Axis ──────────────────────────────────────────────────────

purity:
  enabled: true
  forbidden_in_strict:
    - "file_io"
    - "network_io"
    - "stdout"
    - "stderr"
    - "env_vars"
    - "system_clock"
    - "subprocess"
    - "process"
